<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Реестр граждан | Аурелия</title>
<link rel="stylesheet" href="css/style.css">

<style>
table{
width:100%;
border-collapse:collapse;
background:white;
border-radius:10px;
overflow:hidden;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

th, td{
padding:12px;
text-align:left;
border-bottom:1px solid #eee;
}

th{
background:#0b5d3b;
color:white;
}

.status{
color:green;
font-weight:bold;
}

.panel{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:8px 12px;
background:#0b5d3b;
color:white;
border:none;
border-radius:6px;
cursor:pointer;
}
</style>

</head>

<body>

<header>
<h1>🧾 Реестр граждан Аурелии</h1>
<p>Государственная база граждан</p>
</header>

<nav>
<a href="index.html">Главная</a>
<a href="apply.html">Заявка</a>
<a href="news.html">Новости</a>
</nav>

<main>

<!-- ПАНЕЛЬ ДОБАВЛЕНИЯ -->
<div class="panel">
<h2>➕ Добавить гражданина</h2>

<input type="text" placeholder="Имя">
<input type="text" placeholder="Статус (Гражданин / Монарх)">
<input type="text" placeholder="ID (AUR-0002)">

<button>Добавить (вручную)</button>

<p style="font-size:12px;color:gray;">
⚠️ Пока добавление вручную (это симуляция государства)
</p>
</div>

<!-- РЕЕСТР -->
<div class="panel">

<h2>📋 Граждане</h2>

<table>

<tr>
<th>№</th>
<th>Имя</th>
<th>Статус</th>
<th>ID</th>
</tr>

<tr>
<td>1</td>
<td>Король Лев I</td>
<td class="status">Монарх</td>
<td>AUR-0001</td>
</tr>

<!-- 👇 СЮДА БУДЕШЬ ДОБАВЛЯТЬ ЛЮДЕЙ -->

</table>

</div>

</main>

<footer>
© 2026 Королевство Аурелия
</footer>

</body>
</html>
